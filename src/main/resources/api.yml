openapi: 3.0.3
info:
  title: Leaderboard API
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local env

paths:
  /scores:
    post:
      tags:
        - 'leaderboard'
      summary: Post new score
      operationId: publishNewScore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Score'
      responses:
        '202':
          description: Successful published new score
        '400':
          description: Invalid request payload
  /leaderboard/{gameId}/top10:
    get:
      tags:
        - 'leaderboard'
      summary: Get top 10 players for an event
      operationId: getTop10
      parameters:
        - in: path
          name: gameId
          schema:
            type: string
          required: true
      responses:
        '200':
          description: A list of top 10 players by score
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerRank"
        '400':
          description: Invalid request payload



components:
  schemas:
    Score:
      type: object
      required:
        - playerId
        - gameId
        - score
      properties:
        playerId:
          type: string
        gameId:
          type: string
        score:
          type: integer
          format: int64
    PlayerRank:
      type: object
      properties:
        rank:
          type: integer
        playerId:
          type: string
        score:
          type: double